app = "acervo-api"
primary_region = "lax"

[build]
  dockerfile = "../Dockerfile"

[deploy]
  strategy = "immediate"

[env]
  PYTHONUNBUFFERED = "1"

[processes]
  app = "uvicorn api.api:app --host 0.0.0.0 --port 8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
