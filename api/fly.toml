app = "acervo-api"
primary_region = "lax"

[build]
dockerfile = "../Dockerfile"

[deploy]
strategy = "immediate"

[env]
PYTHONUNBUFFERED = "1"

[http_service]
auto_start_machines = false
auto_stop_machines = false
force_https = true
internal_port = 8080
min_machines_running = 1
processes = [ "worker" ]

[processes]
worker = "python worker/worker.py"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 1024
