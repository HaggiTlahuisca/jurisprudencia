app = "acervo-worker"
primary_region = "lax"
[build]
  dockerfile = "../Dockerfile"
[env]
  PYTHONUNBUFFERED = "1"
[processes]
  worker = "python worker/worker.py"
[deploy]
  strategy = "immediate"
[metrics]
  port = 9091
  path = "/metrics"
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
  processes = ["worker"]
# ── Política de apagado por proceso ───────────────────
# Esto sí aplica al worker (a diferencia de [http_service])
[checks]
  [checks.alive]
    type = "tcp"
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"
